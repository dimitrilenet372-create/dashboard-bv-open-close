<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bureaux de vote — Dashboard</title>
  <link rel="stylesheet" type="text/css" href="/dashboard-bv-open-close/dashboard.css">
</head>
<body>

<div class="header">
  <div>
    <h1>Bureaux de vote</h1>
    <p id="date-label"></p>
  </div>
  <div class="stats">
    <span class="stat stat-open"   id="s-open">— ouverts</span>
    <span class="stat stat-closed" id="s-closed">— fermés</span>
    <span class="stat stat-total">72 total</span>
  </div>
</div>

<div class="toolbar">
  <input type="text" placeholder="Rechercher par numéro, lieu ou adresse…" id="search" />
  <button class="f-btn a-all" id="f-all"    onclick="setF('all')">Tous</button>
  <button class="f-btn"       id="f-open"   onclick="setF('open')">Ouverts</button>
  <button class="f-btn"       id="f-closed" onclick="setF('closed')">Fermés</button>
</div>

<div id="loading" class="loading">Connexion à la base de données…</div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div>
        <p id="modal-title"></p>
        <p id="modal-sub"></p>
        <p id="modal-adresse"></p>
      </div>
      <span id="modal-current">
        <span id="modal-dot"></span>
        <span id="modal-current-label"></span>
      </span>
    </div>
    <div class="btn-group">
      <button class="btn-status" id="btn-closed" onclick="selectStatus('closed')">
        <div class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="#E24B4A" stroke-width="1.5"/>
            <path d="M7 7l6 6M13 7l-6 6" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        Fermé
      </button>
      <button class="btn-status" id="btn-open" onclick="selectStatus('open')">
        <div class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="#1D9E75" stroke-width="1.5"/>
            <path d="M6.5 10l2.5 2.5 5-5" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        Ouvert
      </button>
    </div>
    <div class="row-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button id="btn-confirm" onclick="confirmStatus()" disabled>Confirmer</button>
    </div>
  </div>
</div>

<canvas id="fw" style="display:none;position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>

<div id="popup-all-open" style="display:none;position:fixed;inset:0;z-index:10000;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);">
  <div style="background:#fff;border-radius:16px;padding:2rem 2rem 1.5rem;max-width:340px;width:90%;text-align:center;display:flex;flex-direction:column;gap:1rem;">
    <div style="font-size:48px;">🎉</div>
    <p style="font-size:18px;font-weight:500;color:#1a1a1a;line-height:1.4;">Tous les bureaux de vote sont ouverts !</p>
    <p style="font-size:14px;color:#6b6b6b;">Bravo à toutes les équipes.</p>
    <button onclick="fermerPopup()" style="margin-top:0.5rem;padding:13px;border-radius:10px;border:none;background:#185fa5;color:#e6f1fb;font-size:15px;font-weight:500;cursor:pointer;">OK</button>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="/dashboard-bv-open-close/dashboard.js"></script>
</body>
</html>
