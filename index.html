<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bureaux de vote — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

<div class="header">
  <div>
    <h1>Bureaux de vote</h1>
    <p id="date-label"></p>
  </div>
  <div class="stats">
    <span class="stat stat-open"   id="s-open">0 ouverts</span>
    <span class="stat stat-closed" id="s-closed">72 fermés</span>
    <span class="stat stat-total">72 total</span>
  </div>
</div>

<div class="toolbar">
  <input type="text" placeholder="Rechercher par numéro, lieu ou adresse…" id="search" />
  <button class="f-btn a-all" id="f-all"    onclick="setF('all')">Tous</button>
  <button class="f-btn"       id="f-open"   onclick="setF('open')">Ouverts</button>
  <button class="f-btn"       id="f-closed" onclick="setF('closed')">Fermés</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div>
        <p id="modal-title"></p>
        <p id="modal-sub"></p>
        <p id="modal-adresse"></p>
      </div>
      <span id="modal-current">
        <span id="modal-dot"></span>
        <span id="modal-current-label"></span>
      </span>
    </div>

    <div class="btn-group">
      <button class="btn-status" id="btn-closed" onclick="selectStatus('closed')">
        <div class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="#E24B4A" stroke-width="1.5"/>
            <path d="M7 7l6 6M13 7l-6 6" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        Fermé
      </button>
      <button class="btn-status" id="btn-open" onclick="selectStatus('open')">
        <div class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="#1D9E75" stroke-width="1.5"/>
            <path d="M6.5 10l2.5 2.5 5-5" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        Ouvert
      </button>
    </div>

    <div class="row-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button id="btn-confirm"   onclick="confirmStatus()" disabled>Confirmer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="dashboard.js"></script>
</body>
</html>
